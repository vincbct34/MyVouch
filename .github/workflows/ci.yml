name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # >= 22.6 is required for `node --experimental-strip-types` (see engines).
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # next build runs with NODE_ENV=production, where the app fails fast if
          # these are unset. Dummy values are fine — nothing is deployed here.
          BASE_URL: https://ci.example.com
          SESSION_SECRET: ci-only-build-secret-not-used-in-production
